server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options nosniff;
  add_header Referrer-Policy no-referrer;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self';";

  location /assets/diagrams/ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  location /diagrams/ {
    rewrite ^/diagrams/(.*)$ /$1 last;
  }

  location / {
    try_files $uri /index.html;
  }
}
